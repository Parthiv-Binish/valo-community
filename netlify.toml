[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Redirect all non-asset routes to index.html for React Router (SPA)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Dev server proxy — mirrors production Netlify Functions locally
[dev]
  command     = "npm run dev"
  port        = 8888
  targetPort  = 5173
  autoLaunch  = false